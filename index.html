<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pronósticos Mundial 2026</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app-shell">
    <section class="team-card">
      <h1>Pronósticos Mundial 2026</h1>
      <p>Acceso privado con email autorizado y nombre visible independiente.</p>
    </section>

    <section class="team-card">
      <h2>Conexión Supabase</h2>
      <label for="supabaseUrl">Project URL</label>
      <input id="supabaseUrl" type="text" placeholder="https://TU-PROYECTO.supabase.co" />

      <label for="supabaseKey">Anon key</label>
      <input id="supabaseKey" type="text" placeholder="Pega aquí tu anon key" />

      <button id="connectButton">Conectar</button>
      <p id="connectMessage"></p>
    </section>

    <section class="team-card">
      <h2>Registro y login</h2>

      <label for="emailInput">Correo electrónico</label>
      <input id="emailInput" type="email" placeholder="tu-correo@ejemplo.com" />

      <label for="passwordInput">Contraseña</label>
      <input id="passwordInput" type="password" placeholder="Introduce tu contraseña" />

      <label for="passwordConfirmInput">Confirmar contraseña (solo registro)</label>
      <input id="passwordConfirmInput" type="password" placeholder="Repite la contraseña" />

      <div class="button-row">
        <button id="registerButton">Registrarme</button>
        <button id="loginButton">Iniciar sesión</button>
        <button id="logoutButton">Cerrar sesión</button>
      </div>

      <p id="authMessage"></p>
      <p id="sessionMessage"></p>
    </section>

    <section class="team-card">
      <h2>Perfil</h2>

      <label for="displayNameInput">Nombre visible en la app</label>
      <input id="displayNameInput" type="text" placeholder="Ej. Sulo, El Tigre, Pepito..." />

      <div class="button-row">
        <button id="loadProfileButton">Cargar perfil</button>
        <button id="saveProfileButton">Guardar nombre visible</button>
      </div>

      <p id="profileMessage"></p>
    </section>

    <section class="team-card">
      <h2>Partidos</h2>
      <button id="loadTeamsButton">Cargar partidos</button>
      <p id="teamsMessage"></p>
      <div id="teamsContainer"></div>
    </section>
  </main>

  <script type="module" src="app.js?v=16"></script>
</body>
</html>
