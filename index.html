<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pronósticos Mundial</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="header">
    <h1>Pronósticos Mundial 2026</h1>
    <p>Fase inicial del frontend conectada a Supabase</p>
  </header>

  <main class="container">
    <section class="card">
      <h2>Conexión con Supabase</h2>

      <label for="supabaseUrl">Project URL</label>
      <input id="supabaseUrl" type="text" placeholder="https://TU-PROYECTO.supabase.co" />

      <label for="supabaseKey">Anon key</label>
      <input id="supabaseKey" type="text" placeholder="Pega aquí tu anon key" />

      <button id="connectButton">Conectar con Supabase</button>
      <p id="connectMessage"></p>
    </section>

    <section class="card">
      <h2>Equipos desde v_teams</h2>
      <p>Pulsa el botón para cargar los equipos desde Supabase.</p>

      <button id="loadTeamsButton">Cargar equipos</button>
      <p id="teamsMessage"></p>

      <div id="teamsContainer"></div>
    </section>
  </main>

  <script type="module" src="app.js?v=5"></script>
</body>
</html>
